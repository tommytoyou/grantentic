<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grantentic{% endblock %}</title>
    <meta name="description" content="{% block description %}Grantentic — AI-powered SBIR proposals for deep tech founders. Built for NSF, DoD, and NASA.{% endblock %}">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <!-- Fonts: Space Grotesk for headings, Inter for body -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap">

    <style>
        :root {
            --bg: #060a12;
            --bg-raised: #0a1120;
            --bg-panel: #05080f;
            --bg-card: #0d1420;
            --border: #1a2332;
            --border-strong: #232f44;
            --accent: #00e5a0;
            --accent-bright: #4dffc5;
            --accent-deep: #00b37d;
            --accent-dim: #7cf4cf;
            --text: #e8ecf2;
            --text-muted: #8892a4;
            --text-dim: #5a6578;
            --font-display: 'Space Grotesk', 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --max-w: 1240px;
            --radius: 14px;
            --radius-sm: 10px;
            --radius-pill: 999px;
            --shadow-accent: 0 24px 48px -20px rgba(0, 229, 160, 0.3);
            --shadow-card: 0 20px 60px -30px rgba(0, 0, 0, 0.6);
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            font-size: 18px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }

        h1, h2, h3, h4 {
            margin: 0;
            font-family: var(--font-display);
            font-weight: 700;
            line-height: 1.1;
            letter-spacing: -0.025em;
            color: #fff;
        }
        p { margin: 0; }

        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 1.75rem;
        }

        /* ── Navigation ── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(6, 10, 18, 0.82);
            backdrop-filter: saturate(180%) blur(14px);
            -webkit-backdrop-filter: saturate(180%) blur(14px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 72px;
            gap: 1.5rem;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.625rem;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 1.15rem;
            letter-spacing: -0.02em;
            color: #fff;
        }
        .nav-logo {
            display: inline-flex;
            width: 34px;
            height: 34px;
            align-items: center;
            justify-content: center;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
        }
        .nav-logo svg {
            width: 17px;
            height: 17px;
            color: #032a1e;
        }
        .nav-links {
            display: flex;
            gap: 2.25rem;
            font-size: 0.9375rem;
            font-weight: 500;
            color: var(--text-muted);
        }
        .nav-links a {
            transition: color .15s ease;
        }
        .nav-links a:hover { color: var(--text); }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.8rem 1.35rem;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            font-family: var(--font-body);
            font-size: 0.9375rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform .15s ease, background .15s ease, border-color .15s ease, filter .15s ease, box-shadow .2s ease;
            line-height: 1;
            white-space: nowrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #00120b;
            font-weight: 700;
            box-shadow: 0 10px 30px -14px rgba(0, 229, 160, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25);
        }
        .btn-primary:hover {
            filter: brightness(1.08);
            transform: translateY(-1px);
            box-shadow: 0 18px 40px -16px rgba(0, 229, 160, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-strong);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: #2a3a54;
        }
        .btn-ghost {
            background: transparent;
            border-color: var(--border-strong);
            color: var(--text);
        }
        .btn-ghost:hover {
            background: rgba(0, 229, 160, 0.08);
            border-color: rgba(0, 229, 160, 0.4);
            color: var(--accent-dim);
        }
        .btn-lg {
            padding: 1.1rem 1.75rem;
            font-size: 1rem;
        }
        .btn-xl {
            padding: 1.3rem 2.1rem;
            font-size: 1.125rem;
            font-weight: 700;
        }
        .btn-block { width: 100%; }

        /* ── Forms ── */
        .email-form {
            display: flex;
            gap: 0.75rem;
            max-width: 560px;
            margin: 0 auto;
        }
        .email-form input[type="email"] {
            flex: 1;
            padding: 1.1rem 1.25rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: var(--bg-card);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color .15s ease, background .15s ease, box-shadow .15s ease;
        }
        .email-form input[type="email"]::placeholder { color: var(--text-dim); }
        .email-form input[type="email"]:focus {
            border-color: var(--accent);
            background: #0f1827;
            box-shadow: 0 0 0 3px rgba(0, 229, 160, 0.15);
        }

        /* ── Sections ── */
        .section {
            padding: 8rem 0;
            border-top: 1px solid var(--border);
        }
        .section-label {
            display: inline-block;
            color: var(--accent);
            font-family: var(--font-display);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            font-size: 0.8125rem;
            margin-bottom: 1.25rem;
        }
        .section-heading {
            font-size: 3rem;
            letter-spacing: -0.03em;
            margin-bottom: 1.25rem;
        }
        .section-lead {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 720px;
            line-height: 1.55;
        }
        .section-head-center {
            text-align: center;
            max-width: 800px;
            margin: 0 auto 5rem;
        }
        .section-head-center .section-lead {
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Cards ── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
        }

        /* ── Agency logo strip (shared utility) ── */
        .agency-strip-wrap {
            text-align: center;
        }
        .agency-strip-wrap .label {
            color: var(--text-muted);
            font-family: var(--font-display);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.22em;
            font-size: 0.8125rem;
            margin-bottom: 2.5rem;
        }
        .agency-strip-wrap .logos {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 5rem;
        }
        .agency-strip-wrap .logos img {
            height: 180px;
            width: auto;
            max-width: 100%;
            object-fit: contain;
            background: transparent;
            border: 0;
            border-radius: 0;
            filter: drop-shadow(0 0 1px rgba(255, 255, 255, 0.35));
        }

        /* ── Footer ── */
        .footer {
            padding: 4rem 0 3rem;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.9375rem;
        }
        .footer-inner {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }
        .footer-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1.5rem;
        }
        .footer-links {
            display: flex;
            gap: 2rem;
        }
        .footer-links a {
            transition: color .15s ease;
        }
        .footer-links a:hover { color: var(--text); }
        .footer-fine {
            font-size: 0.875rem;
            color: var(--text-dim);
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            body { font-size: 17px; }
            .section { padding: 5.5rem 0; }
            .section-heading { font-size: 2rem; }
            .section-lead { font-size: 1.0625rem; }
            .section-head-center { margin-bottom: 3.5rem; }
            .nav-links { display: none; }
            .nav-inner { height: 64px; }
            .email-form { flex-direction: column; }
            .footer-top { flex-direction: column; align-items: flex-start; }
            .footer-links { flex-wrap: wrap; gap: 1.25rem; }
            .agency-strip-wrap .logos { gap: 2.5rem; }
            .agency-strip-wrap .logos img { height: 130px; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-logo">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
                    </svg>
                </span>
                <span>Grantentic</span>
            </a>
            <div class="nav-links">
                <a href="/#how">How It Works</a>
                <a href="/#products">Products</a>
                <a href="/pricing">Pricing</a>
                <a href="/#trust">Trust</a>
            </div>
            <div class="nav-cta">
                <a href="/login" class="btn btn-secondary">Sign In</a>
                <a href="/register" class="btn btn-primary">Get Started</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-top">
                <a href="/" class="nav-brand">
                    <span class="nav-logo">
                        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
                        </svg>
                    </span>
                    <span>Grantentic</span>
                </a>
                <div class="footer-links">
                    <a href="/privacy">Privacy Policy</a>
                    <a href="/login">Sign In</a>
                    <a href="/pricing">Pricing</a>
                    <a href="/#products">Products</a>
                </div>
            </div>
            <p class="footer-fine">© 2026 Grantentic. Built for deep tech founders.</p>
        </div>
    </footer>
</body>
</html>
