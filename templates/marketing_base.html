<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Grantentic{% endblock %}</title>
    <meta name="description" content="{% block description %}Grantentic — AI-powered SBIR proposals for deep tech founders. Built for NSF, DoD, and NASA.{% endblock %}">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
        :root {
            --bg: #0a0f1e;
            --bg-raised: #0e1424;
            --bg-card: rgba(255, 255, 255, 0.025);
            --text: #e5e7eb;
            --text-muted: #9ca3af;
            --text-dim: #6b7280;
            --border: rgba(255, 255, 255, 0.08);
            --border-strong: rgba(255, 255, 255, 0.16);
            --accent: #10b981;
            --accent-hover: #34d399;
            --accent-dim: #6ee7b7;
            --accent-deep: #059669;
            --max-w: 1200px;
            --radius: 14px;
            --radius-sm: 8px;
            --radius-pill: 999px;
            --shadow-emerald: 0 20px 40px -20px rgba(16, 185, 129, 0.25);
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: inherit; text-decoration: none; }

        h1, h2, h3, h4 {
            margin: 0;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -0.02em;
            color: #fff;
        }
        p { margin: 0; }

        .container {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* ── Navigation ── */
        .nav {
            position: sticky;
            top: 0;
            z-index: 40;
            background: rgba(10, 15, 30, 0.78);
            backdrop-filter: saturate(180%) blur(12px);
            -webkit-backdrop-filter: saturate(180%) blur(12px);
            border-bottom: 1px solid var(--border);
        }
        .nav-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-brand {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            font-size: 1.075rem;
            letter-spacing: -0.01em;
        }
        .nav-logo {
            display: inline-flex;
            width: 32px;
            height: 32px;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-deep));
        }
        .nav-logo svg {
            width: 16px;
            height: 16px;
            color: #031b11;
        }
        .nav-links {
            display: flex;
            gap: 2rem;
            font-size: 0.9375rem;
            color: var(--text-muted);
        }
        .nav-links a:hover { color: #fff; }
        .nav-cta {
            display: flex;
            align-items: center;
            gap: 0.625rem;
        }

        /* ── Buttons ── */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            font-family: inherit;
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform .15s ease, background .15s ease, border-color .15s ease, filter .15s ease;
            line-height: 1;
        }
        .btn-primary {
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-deep) 100%);
            color: #031b11;
            font-weight: 600;
            box-shadow: var(--shadow-emerald), inset 0 1px 0 rgba(255, 255, 255, 0.18);
        }
        .btn-primary:hover { filter: brightness(1.06); transform: translateY(-1px); }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-strong);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.25);
        }
        .btn-lg {
            padding: 1.125rem 1.75rem;
            font-size: 1.0625rem;
        }
        .btn-xl {
            padding: 1.25rem 2rem;
            font-size: 1.125rem;
        }
        .btn-block { width: 100%; }

        /* ── Forms ── */
        .email-form {
            display: flex;
            gap: 0.625rem;
            max-width: 480px;
            margin: 0 auto;
        }
        .email-form input[type="email"] {
            flex: 1;
            padding: 0.95rem 1.1rem;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-strong);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color .15s ease, background .15s ease;
        }
        .email-form input[type="email"]::placeholder { color: var(--text-dim); }
        .email-form input[type="email"]:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.06);
        }

        /* ── Sections ── */
        .section {
            padding: 7.5rem 0;
            border-top: 1px solid var(--border);
        }
        .section-label {
            display: inline-block;
            color: var(--accent-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 0.8125rem;
            margin-bottom: 1rem;
        }
        .section-heading {
            font-size: 2.75rem;
            letter-spacing: -0.025em;
            margin-bottom: 1.125rem;
        }
        .section-lead {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 680px;
            line-height: 1.55;
        }
        .section-head-center {
            text-align: center;
            max-width: 760px;
            margin: 0 auto 4.5rem;
        }
        .section-head-center .section-lead {
            margin-left: auto;
            margin-right: auto;
        }

        /* ── Card ── */
        .card {
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.035) 0%, rgba(255, 255, 255, 0.01) 100%);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.75rem;
            transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
        }

        /* ── Footer ── */
        .footer {
            padding: 3rem 0;
            border-top: 1px solid var(--border);
            color: var(--text-muted);
            font-size: 0.875rem;
        }
        .footer-inner {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .footer-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .footer-links {
            display: flex;
            gap: 1.5rem;
        }
        .footer-links a:hover { color: #fff; }
        .footer-fine {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .section { padding: 5rem 0; }
            .section-heading { font-size: 2rem; }
            .section-lead { font-size: 1.0625rem; }
            .section-head-center { margin-bottom: 3rem; }
            .nav-links { display: none; }
            .email-form { flex-direction: column; }
            .footer-top { flex-direction: column; align-items: flex-start; }
        }

        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>
    <nav class="nav">
        <div class="container nav-inner">
            <a href="/" class="nav-brand">
                <span class="nav-logo">
                    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
                    </svg>
                </span>
                <span>Grantentic</span>
            </a>
            <div class="nav-links">
                <a href="/#how">How It Works</a>
                <a href="/#products">Products</a>
                <a href="/#trust">Trust</a>
            </div>
            <div class="nav-cta">
                <a href="/login" class="btn btn-secondary">Sign In</a>
                <a href="/register" class="btn btn-primary">Get Started</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container footer-inner">
            <div class="footer-top">
                <a href="/" class="nav-brand">
                    <span class="nav-logo">
                        <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M13 2L3 14h7l-1 8 10-12h-7l1-8z"/>
                        </svg>
                    </span>
                    <span>Grantentic</span>
                </a>
                <div class="footer-links">
                    <a href="/privacy">Privacy</a>
                    <a href="/login">Sign In</a>
                    <a href="/register">Get Started</a>
                </div>
            </div>
            <p class="footer-fine">© 2026 Grantentic. Built for deep tech founders.</p>
        </div>
    </footer>
</body>
</html>
